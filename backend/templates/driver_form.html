{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} Driver | NexusFleet{% endblock %}
{% block page_title %}{% if editing %}Edit Driver{% else %}New Driver{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Name</label>
        <input type="text" name="name" value="{{ record.name|default:'' }}">
      </div>
      <div class="form-group">
        <label>License Number</label>
        <input type="text" name="license_number" value="{{ record.license_number|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Phone</label>
        <input type="text" name="phone" value="{{ record.phone|default:'' }}">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" value="{{ record.email|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="active" {% if record.status == 'active' %}selected{% endif %}>Active</option>
          <option value="on_trip" {% if record.status == 'on_trip' %}selected{% endif %}>On Trip</option>
          <option value="off_duty" {% if record.status == 'off_duty' %}selected{% endif %}>Off Duty</option>
          <option value="suspended" {% if record.status == 'suspended' %}selected{% endif %}>Suspended</option>
        </select>
      </div>
      <div class="form-group">
        <label>Trips Completed</label>
        <input type="number" name="trips_completed" value="{{ record.trips_completed|default:'0' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Rating</label>
        <input type="number" step="0.01" name="rating" value="{{ record.rating|default:'0' }}">
      </div>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} Driver</button>
      <a href="/drivers/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
