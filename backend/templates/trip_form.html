{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} Trip | NexusFleet{% endblock %}
{% block page_title %}{% if editing %}Edit Trip{% else %}New Trip{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Vehicle Reg</label>
        <input type="text" name="vehicle_reg" value="{{ record.vehicle_reg|default:'' }}">
      </div>
      <div class="form-group">
        <label>Driver Name</label>
        <input type="text" name="driver_name" value="{{ record.driver_name|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Origin</label>
        <input type="text" name="origin" value="{{ record.origin|default:'' }}">
      </div>
      <div class="form-group">
        <label>Destination</label>
        <input type="text" name="destination" value="{{ record.destination|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Distance Km</label>
        <input type="number" step="0.01" name="distance_km" value="{{ record.distance_km|default:'0' }}">
      </div>
      <div class="form-group">
        <label>Fuel Cost</label>
        <input type="number" step="0.01" name="fuel_cost" value="{{ record.fuel_cost|default:'0' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Start Date</label>
        <input type="date" name="start_date" value="{{ record.start_date|date:'Y-m-d'|default:'' }}">
      </div>
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="planned" {% if record.status == 'planned' %}selected{% endif %}>Planned</option>
          <option value="in_progress" {% if record.status == 'in_progress' %}selected{% endif %}>In Progress</option>
          <option value="completed" {% if record.status == 'completed' %}selected{% endif %}>Completed</option>
          <option value="cancelled" {% if record.status == 'cancelled' %}selected{% endif %}>Cancelled</option>
        </select>
      </div>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} Trip</button>
      <a href="/trips/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
